<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ShiroBot Dashboard</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f172a;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      max-width: 560px;
      padding: 32px;
      border: 1px solid #334155;
      border-radius: 18px;
      background: #111827;
      box-shadow: 0 24px 80px rgb(0 0 0 / 35%);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }

    p {
      margin: 0;
      color: #94a3b8;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <main>
    <h1>ShiroBot Dashboard</h1>
    <p>内嵌 Dashboard 静态资源已加载。后续前端构建产物可以放在 <code>ShiroBot/Assets/dashboard</code> 下。</p>
  </main>
</body>
</html>
