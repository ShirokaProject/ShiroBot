name: Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'
  DOTNET_NOLOGO: '1'
  CONFIGURATION: Release
  HOST_PROJECT: ShiroBot/ShiroBot.csproj
  SOLUTION_FILE: Shirobot.slnx

jobs:
  prepare:
    name: Prepare shared assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Shirobot.Dashboard/package-lock.json

      - name: Pack NuGet packages
        run: |
          set -euo pipefail

          dotnet restore "${{ env.SOLUTION_FILE }}" --property:Configuration="${{ env.CONFIGURATION }}"

          dotnet pack ShiroBot.Model/ShiroBot.Model.csproj \
            --configuration "${{ env.CONFIGURATION }}" \
            --no-restore \
            --output artifacts/nuget \
            /p:ContinuousIntegrationBuild=true

          dotnet pack ShiroBot.SDK/ShiroBot.SDK.csproj \
            --configuration "${{ env.CONFIGURATION }}" \
            --no-restore \
            --output artifacts/nuget \
            /p:ContinuousIntegrationBuild=true

          dotnet pack ShiroBot.AvaloniaSdk/ShiroBot.AvaloniaSdk.csproj \
            --configuration "${{ env.CONFIGURATION }}" \
            --no-restore \
            --output artifacts/nuget \
            /p:ContinuousIntegrationBuild=true

          dotnet run --project ShiroBot.Verification/ShiroBot.Verification.csproj \
            --configuration "${{ env.CONFIGURATION }}" \
            --no-restore

          dotnet run --project MilkyModelGenerator.Net/MilkyModelGenerator.Net.csproj \
            --configuration "${{ env.CONFIGURATION }}" \
            -- --self-test

      - name: Build dashboard assets once
        run: |
          set -euo pipefail

          dotnet msbuild "${{ env.HOST_PROJECT }}" \
            -target:BuildDashboardAssets \
            -property:Configuration="${{ env.CONFIGURATION }}" \
            /p:ContinuousIntegrationBuild=true \
            /p:BuildDashboard=true \
            /p:BuildDashboardOnPublish=false

          test -f ShiroBot/Assets/dashboard/index.html

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            artifacts/nuget/*.nupkg
            artifacts/nuget/*.snupkg
          if-no-files-found: error

      - name: Upload dashboard assets
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-assets
          path: ShiroBot/Assets/dashboard/**
          if-no-files-found: error

  publish-host:
    name: Publish ${{ matrix.runtime }} ${{ matrix.publish_kind }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        runtime: [win-x64, win-arm64, linux-x64, linux-arm64, osx-x64, osx-arm64]
        publish_kind: [framework-dependent, self-contained]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Download dashboard assets
        uses: actions/download-artifact@v4
        with:
          name: dashboard-assets
          path: ShiroBot/Assets/dashboard

      - name: Publish host package
        run: |
          set -euo pipefail

          mkdir -p artifacts/archives

          runtime='${{ matrix.runtime }}'
          publish_kind='${{ matrix.publish_kind }}'

          self_contained=false
          if [ "$publish_kind" = "self-contained" ]; then
            self_contained=true
          fi

          output_dir="artifacts/host/${runtime}-${publish_kind}"
          host_exe="ShiroBot"
          if [[ "$runtime" == win-* ]]; then
            host_exe="ShiroBot.exe"
          fi
          archive_path="$GITHUB_WORKSPACE/artifacts/archives/shirobot-host-${runtime}-${publish_kind}.zip"

          dotnet publish "${{ env.HOST_PROJECT }}" \
            --configuration "${{ env.CONFIGURATION }}" \
            --runtime "$runtime" \
            --self-contained "$self_contained" \
            --output "$output_dir" \
            /p:ContinuousIntegrationBuild=true \
            /p:BuildDashboard=false \
            /p:BuildDashboardOnPublish=false \
            /p:PublishSingleFile=true \
            /p:IncludeNativeLibrariesForSelfExtract=true

          chmod +x "$output_dir/$host_exe"
          (cd "$output_dir" && zip -9 -j "$archive_path" "$host_exe")

      - name: Upload host archive
        uses: actions/upload-artifact@v4
        with:
          name: shirobot-host-${{ matrix.runtime }}-${{ matrix.publish_kind }}
          path: artifacts/archives/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, publish-host]
    steps:
      - name: Download NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/nuget

      - name: Download host archives
        uses: actions/download-artifact@v4
        with:
          pattern: shirobot-host-*
          path: artifacts/archives
          merge-multiple: true

      - name: Create release notes
        run: |
          set -euo pipefail

          tag='${{ github.ref_name }}'
          repo='${{ github.repository }}'
          base_url="https://github.com/${repo}/releases/download/${tag}"

          link_asset() {
            local name="$1"
            if [ -f "artifacts/archives/${name}" ] || [ -f "artifacts/nuget/${name}" ]; then
              printf '[%s](%s/%s)' "$2" "$base_url" "$name"
            else
              printf '%s' "$2"
            fi
          }

          host_link() {
            local runtime="$1"
            local publish="$2"
            local label="$3"
            link_asset "shirobot-host-${runtime}-${publish}.zip" "$label"
          }

          {
            echo "## ${tag}"
            echo
            echo "## 下载地址"
            echo
            echo "#### 自带运行时 self-contained（推荐，不需要预装 .NET）"
            echo
            echo "- Windows: $(host_link win-x64 self-contained x64) | $(host_link win-arm64 self-contained ARM64)"
            echo "- macOS: $(host_link osx-arm64 self-contained Apple芯片) | $(host_link osx-x64 self-contained Intel芯片)"
            echo "- Linux: $(host_link linux-x64 self-contained x64) | $(host_link linux-arm64 self-contained ARM64)"
            echo
            echo "#### 不自带运行时 framework-dependent（需要安装 .NET 10 Runtime）"
            echo
            echo "- Windows: $(host_link win-x64 framework-dependent x64) | $(host_link win-arm64 framework-dependent ARM64)"
            echo "- macOS: $(host_link osx-arm64 framework-dependent Apple芯片) | $(host_link osx-x64 framework-dependent Intel芯片)"
            echo "- Linux: $(host_link linux-x64 framework-dependent x64) | $(host_link linux-arm64 framework-dependent ARM64)"
            echo
            echo "### NuGet 包"
            echo
            for package in artifacts/nuget/*.nupkg; do
              [ -e "$package" ] || continue
              file_name="$(basename "$package")"
              echo "- [${file_name}](${base_url}/${file_name})"
            done
          } > RELEASE_NOTES.md

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            artifacts/archives/*
            artifacts/nuget/*.nupkg
            artifacts/nuget/*.snupkg
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/archives/*
            artifacts/nuget/*.nupkg
            artifacts/nuget/*.snupkg
          fail_on_unmatched_files: true
